- name: hotpotqa_agent
  _target_: recipes.hotpotqa.hotpotqa_agent_flow.HotpotQAAgentFlow
  max_steps: 5
  max_parallel_calls: 4
  force_first_search: true

  # BGE checkpoint. Must match `env/build_index.py --embedding_model`.
  embedding_model_name: ${oc.env:HOTPOTQA_EMBEDDING_MODEL,BAAI/bge-large-en-v1.5}
  # Retrieval corpus/index root. This is separate from train/validation parquet data.
  corpus_data_dir: ${oc.env:HOTPOTQA_CORPUS_DATA_ROOT,data/corpus/hotpotqa_corpus}
  # null: use HOTPOTQA_EMBEDDING_DEVICE (default cpu), or per-worker cuda:i
  # if HOTPOTQA_EMBEDDING_PER_WORKER_GPU=1.
  embedding_devices: null
  enable_tool_parse_feedback: true
